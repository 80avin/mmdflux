name: Packages CI

on:
  push:
    paths:
      - "packages/**"
      - ".github/workflows/packages-ci.yml"
  pull_request:
    paths:
      - "packages/**"
      - ".github/workflows/packages-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  dedupe:
    name: Skip duplicate push runs for open PR branches
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        name: Detect open PR for branch
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName !== 'push') {
              core.setOutput('should_run', 'true');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 1,
            });

            const shouldRun = pulls.length === 0;
            core.setOutput('should_run', shouldRun ? 'true' : 'false');

            if (!shouldRun) {
              core.notice(
                `Skipping push run for ${branch}: open pull request detected (${pulls[0].number}).`,
              );
            }

  lint:
    name: Lint
    if: needs.dedupe.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    needs: dedupe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/package-lock.json

      - name: Install dependencies
        working-directory: packages
        run: npm ci

      - name: Check formatting and lint
        working-directory: packages
        run: npm run check -ws

  test:
    name: Test
    if: needs.dedupe.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    needs:
      - dedupe
      - lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/package-lock.json

      - name: Install dependencies
        working-directory: packages
        run: npm ci

      - name: Build all packages
        working-directory: packages
        run: npm run build -ws

      - name: Run tests
        working-directory: packages
        run: npm test -ws
