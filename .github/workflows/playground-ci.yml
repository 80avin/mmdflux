name: Playground CI

on:
  push:
    paths:
      - "web/**"
      - "crates/mmdflux-wasm/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Justfile"
      - ".github/workflows/playground-ci.yml"
  pull_request:
    paths:
      - "web/**"
      - "crates/mmdflux-wasm/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Justfile"
      - ".github/workflows/playground-ci.yml"
  workflow_dispatch:
    inputs:
      run_benchmark_smoke:
        description: "Run optional benchmark smoke checks"
        required: false
        default: false
        type: boolean
      benchmark_profile:
        description: "WASM build profile for optional benchmark smoke checks"
        required: false
        default: dev
        type: choice
        options:
          - dev
          - release

permissions:
  contents: read

jobs:
  playground:
    name: Test and Build Playground
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: playground-ci

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Run playground tests
        working-directory: web
        run: npm run test

      - name: Build playground
        working-directory: web
        run: npm run build

      - name: Run benchmark smoke checks (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_benchmark_smoke == 'true' }}
        working-directory: web
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.benchmark_profile }}" == "release" ]]; then
            npm run benchmark:smoke:release
          else
            npm run benchmark:smoke
          fi
